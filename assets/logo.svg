<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D97757"/>
      <stop offset="1" stop-color="#C15F3C"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- gauge/usage ring: background track -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="34"/>

  <!-- gauge fill representing "usage" -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#ffffff" stroke-width="34"
          stroke-linecap="round"
          stroke-dasharray="707 943"
          transform="rotate(-90 256 256)"/>

  <!-- center dot / clock hand suggesting reset countdown -->
  <circle cx="256" cy="256" r="14" fill="#ffffff"/>
  <line x1="256" y1="256" x2="256" y2="150" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
</svg>
